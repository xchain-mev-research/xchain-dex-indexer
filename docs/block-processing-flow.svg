<svg width="100%" viewBox="0 0 820 780" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; fill: #555; }
    .box-gray   { fill: #f1efe8; stroke: #888780; }
    .box-purple { fill: #eeedfe; stroke: #534ab7; }
    .box-teal   { fill: #e1f5ee; stroke: #0f6e56; }
    .box-amber  { fill: #faeeda; stroke: #854f0b; }
    .box-coral  { fill: #faece7; stroke: #993c1d; }
    .arr    { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .leader { stroke: #aaa; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
  </style>
</defs>

<!-- BLOCKCHAIN -->
<rect x="270" y="30" width="200" height="44" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="th" x="370" y="52" text-anchor="middle" dominant-baseline="central">Blockchain</text>

<line x1="370" y1="74" x2="370" y2="108" class="arr"/>
<text class="ts" x="386" y="96" dominant-baseline="central">blocks batch</text>

<!-- SUBSQUID PROCESSOR -->
<rect x="230" y="108" width="280" height="56" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="th" x="370" y="130" text-anchor="middle" dominant-baseline="central">Subsquid processor</text>
<text class="ts" x="370" y="150" text-anchor="middle" dominant-baseline="central">EVM or Substrate</text>

<line x1="370" y1="164" x2="370" y2="198" class="arr"/>

<!-- ABSTRACT DATA IMPORTER -->
<rect x="200" y="198" width="340" height="56" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="th" x="370" y="220" text-anchor="middle" dominant-baseline="central">AbstractDataImporter</text>
<text class="ts" x="370" y="240" text-anchor="middle" dominant-baseline="central">Block loop, gap filling, commit</text>

<!-- gap filling annotation (left side) -->
<line x1="200" y1="226" x2="150" y2="226" class="leader"/>
<text class="ts" x="146" y="218" text-anchor="end" dominant-baseline="central">skipped blocks</text>
<text class="ts" x="146" y="234" text-anchor="end" dominant-baseline="central">→ end snapshots</text>

<line x1="370" y1="254" x2="370" y2="288" class="arr"/>

<!-- ABSTRACT DEX DATA IMPORTER -->
<rect x="185" y="288" width="370" height="56" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="th" x="370" y="310" text-anchor="middle" dominant-baseline="central">AbstractDexDataImporter</text>
<text class="ts" x="370" y="330" text-anchor="middle" dominant-baseline="central">Pool registry, snapshot tracker, per-tx dedup</text>

<!-- branch split -->
<path d="M370 344 L370 361 L200 361 L200 378" class="arr"/>
<path d="M370 344 L370 361 L540 361 L540 378" class="arr"/>

<!-- FACTORY EVENT (left) -->
<rect x="90" y="378" width="220" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="th" x="200" y="400" text-anchor="middle" dominant-baseline="central">Factory event</text>
<text class="ts" x="200" y="420" text-anchor="middle" dominant-baseline="central">New pool detected</text>

<!-- POOL EVENT (right) -->
<rect x="430" y="378" width="220" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="th" x="540" y="400" text-anchor="middle" dominant-baseline="central">Pool event</text>
<text class="ts" x="540" y="420" text-anchor="middle" dominant-baseline="central">Sync / Swap / Mint / Burn</text>

<!-- factory → pool registry -->
<line x1="200" y1="434" x2="200" y2="488" class="arr"/>

<rect x="90" y="488" width="220" height="44" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="th" x="200" y="510" text-anchor="middle" dominant-baseline="central">PoolRegistry</text>

<!-- pool event → whitelist check -->
<line x1="540" y1="434" x2="540" y2="468" class="arr"/>

<rect x="430" y="468" width="220" height="44" rx="8" class="box-amber" stroke-width="0.5"/>
<text class="th" x="540" y="484" text-anchor="middle" dominant-baseline="central">Whitelist check</text>
<text class="ts" x="540" y="500" text-anchor="middle" dominant-baseline="central">Both tokens trusted?</text>

<!-- annotation: no → discard (right of whitelist box, well within viewBox) -->
<line x1="650" y1="490" x2="700" y2="490" class="leader"/>
<text class="ts" x="704" y="486" dominant-baseline="central">no →</text>
<text class="ts" x="704" y="500" dominant-baseline="central">discard</text>

<!-- yes path -->
<line x1="540" y1="512" x2="540" y2="546" class="arr"/>
<text class="ts" x="556" y="533" dominant-baseline="central">yes</text>

<!-- NEW SNAPSHOT -->
<rect x="430" y="546" width="220" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="th" x="540" y="568" text-anchor="middle" dominant-baseline="central">New snapshot</text>
<text class="ts" x="540" y="588" text-anchor="middle" dominant-baseline="central">blockNumber, txHash, index, fee</text>

<!-- snapshot → tracker -->
<line x1="540" y1="602" x2="540" y2="636" class="arr"/>

<rect x="430" y="636" width="220" height="44" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="th" x="540" y="658" text-anchor="middle" dominant-baseline="central">PoolSnapshotTracker</text>

<!-- annotation: latest state per pool (right of tracker box, within viewBox) -->
<line x1="650" y1="658" x2="700" y2="658" class="leader"/>
<text class="ts" x="704" y="652" dominant-baseline="central">latest state</text>
<text class="ts" x="704" y="666" dominant-baseline="central">per pool</text>

<!-- converge to end-of-block -->
<path d="M200 532 L200 700 L310 700" class="arr"/>
<path d="M540 680 L540 700 L430 700" class="arr"/>
<text class="ts" x="370" y="692" text-anchor="middle" dominant-baseline="central">end of block</text>

<!-- DB INSERT -->
<rect x="230" y="708" width="280" height="56" rx="8" class="box-coral" stroke-width="0.5"/>
<text class="th" x="370" y="730" text-anchor="middle" dominant-baseline="central">PostgreSQL insert</text>
<text class="ts" x="370" y="750" text-anchor="middle" dominant-baseline="central">New pools + intra-block + end-block snapshots</text>

</svg>
