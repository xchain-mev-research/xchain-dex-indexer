type BlockInclusionCost @entity {
 """
  Numero del blocco (usato come ID univoco).
  """
  id: ID!

  timestamp: DateTime!

  """
  Costo per unità per essere la prima transazione nel blocco.
  - EVM: baseFee + priorityFee
  - Substrate: tip + weightFee
  """
